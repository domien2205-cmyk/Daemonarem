<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DAEMON AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --dark-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--dark-bg);
            color: var(--neon-green);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .cyber-header {
            background: linear-gradient(90deg, rgba(0,255,157,0.1), rgba(255,0,255,0.1));
            border-bottom: 2px solid var(--neon-green);
            padding: 15px;
            padding-top: calc(15px + env(safe-area-inset-top));
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,157,0.3);
            z-index: 100;
        }

        .glitch-text {
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-cyan);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-cyan); }
            25% { text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-cyan); }
            50% { text-shadow: 0.025em 0.05em 0 var(--neon-pink), -0.05em -0.05em 0 var(--neon-cyan); }
        }

        .sensor-bar {
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--neon-green);
            padding: 8px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            font-size: 0.75em;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .sensor-bar::-webkit-scrollbar { display: none; }

        .chip {
            background: rgba(0,50,40,0.8);
            border: 1px solid var(--neon-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .chip.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
            font-weight: bold;
        }

        .chip.error {
            background: #ff0040;
            border-color: #ff0040;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .video-wrapper {
            position: fixed;
            top: calc(80px + env(safe-area-inset-top));
            right: 10px;
            width: 160px;
            height: 120px;
            border: 2px solid var(--neon-pink);
            border-radius: 10px;
            overflow: hidden;
            z-index: 99;
            background: #000;
            box-shadow: 0 0 20px rgba(255,0,255,0.5);
        }

        .video-wrapper::after {
            content: "REC";
            position: absolute;
            top: 5px;
            left: 5px;
            background: red;
            color: white;
            padding: 2px 6px;
            font-size: 0.65em;
            border-radius: 3px;
            animation: blink 1.5s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .activation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            gap: 20px;
            padding: 20px;
        }

        .activation-box {
            background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,157,0.1));
            border: 2px solid var(--neon-pink);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 0 50px rgba(255,0,255,0.3);
            width: 100%;
            max-width: 400px;
        }

        .activate-btn {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 18px 36px;
            font-size: 1.1em;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
        }

        .activate-btn:active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(0.98);
        }

        .activate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-container {
            height: calc(100dvh - 180px);
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 100px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .keyboard-open .chat-container {
            height: calc(100dvh - 300px);
        }

        .keyboard-open .video-wrapper {
            width: 100px;
            height: 75px;
            top: auto;
            bottom: 180px;
            right: 10px;
        }

        .message {
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
            max-width: 90%;
            position: relative;
            animation: fadeIn 0.3s ease-in;
            line-height: 1.4;
            font-size: 0.95em;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(0,50,40,0.6);
            margin-left: auto;
            border-left: 3px solid var(--neon-green);
            text-align: right;
        }

        .message.assistant {
            background: rgba(50,0,50,0.6);
            border-right: 3px solid var(--neon-pink);
        }

        .message-header {
            font-size: 0.7em;
            opacity: 0.7;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5,5,5,0.98);
            border-top: 2px solid var(--neon-green);
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        textarea {
            flex: 1;
            background: rgba(0,20,10,0.8);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 8px;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.4;
        }

        button {
            background: rgba(0,255,157,0.2);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            min-height: 48px;
            font-size: 0.9em;
        }

        button:active {
            transform: scale(0.95);
            background: var(--neon-green);
            color: #000;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .voice-btn {
            background: rgba(255,0,255,0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            padding: 12px;
            font-size: 1.2em;
        }

        .voice-btn.muted {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .status-line {
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom));
            left: 0;
            width: 100%;
            padding: 6px 15px;
            background: rgba(0,0,0,0.9);
            font-size: 0.7em;
            color: var(--neon-cyan);
            border-top: 1px solid rgba(0,255,157,0.2);
            z-index: 49;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
        }

        .thinking {
            display: flex;
            gap: 4px;
            align-items: center;
            color: var(--neon-pink);
            font-style: italic;
            font-size: 0.9em;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--neon-pink);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 3px;
        }

        @media (max-height: 400px) {
            .video-wrapper { display: none; }
            .cyber-header { display: none; }
            .chat-container { height: calc(100dvh - 100px); }
        }

        .debug-info {
            font-size: 0.7em;
            color: #666;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="cyber-header">
    <div class="glitch-text">DAEMON v1.0</div>
    <div style="font-size: 0.65em; margin-top: 5px; opacity: 0.8;">
        AI VISION SYSTEM
    </div>
</div>

<div class="sensor-bar">
    <span class="chip" id="cam-chip">📹 CAM</span>
    <span class="chip" id="gps-chip">📍 GPS</span>
    <span class="chip" id="motion-chip">📡 ACC</span>
    <span class="chip" id="orient-chip">🧭 MAG</span>
    <span class="chip" id="voice-chip">🔊 TTS</span>
    <span class="chip" id="net-chip">🌐 NET</span>
</div>

<div class="video-wrapper" id="video-wrapper" style="display:none;">
    <video id="video" autoplay playsinline muted></video>
</div>

<div id="activation-overlay" class="activation-overlay">
    <div class="activation-box">
        <h1 class="glitch-text" style="font-size: 1.8em; margin-bottom: 10px;">DAEMON</h1>
        <p style="margin: 15px 0; color: var(--neon-cyan); font-size: 0.9em; line-height: 1.4;">
            Sistema AI Multimodale<br>
            Richiede HTTPS per funzionare
        </p>
        <div class="debug-info" id="protocol-info">
            Verifica protocollo...
        </div>
        <button class="activate-btn" id="activate-btn" onclick="activateDaemon()">
            INIZIALIZZA SISTEMA
        </button>
        <div id="activation-status" style="margin-top: 15px; font-size: 0.8em; color: var(--neon-green); min-height: 20px;"></div>
    </div>
</div>

<div id="chat" class="chat-container"></div>

<div class="status-line">
    <span id="system-status">STANDBY</span>
    <span id="coords">--.---- | --.----</span>
</div>

<div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Comunica con DAEMON..." disabled></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled style="padding: 12px 20px;">➤</button>
    <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">🔊</button>
    <button onclick="clearChat()" style="background: rgba(255,0,0,0.2); border-color: #ff0040; color: #ff0040; padding: 12px;">✕</button>
</div>

<script>
// Verifica protocollo all'avvio
document.getElementById('protocol-info').textContent = 
    "Protocollo: " + location.protocol + " | Host: " + location.hostname;

if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    document.getElementById('protocol-info').innerHTML = 
        "<span style='color:#ff0040'>⚠️ RICHIESTO HTTPS! Su Android la camera non funziona senza HTTPS.</span>";
}

const CONFIG = {
    MODEL: "anthropic/claude-3-5-sonnet",
    MAX_HISTORY: 50,
    ANDROID_MODE: /Android/.test(navigator.userAgent)
};

let state = {
    initialized: false,
    videoStream: null,
    currentPosition: null,
    motionData: null,
    orientationData: null,
    conversationHistory: [],
    voiceEnabled: true,
    lastFrame: null,
    wakeLock: null,
    sensors: {
        camera: false,
        gps: false,
        motion: false,
        orientation: false,
        voice: false,
        net: false
    }
};

function vibrate(pattern = 50) {
    if (CONFIG.ANDROID_MODE && navigator.vibrate) {
        navigator.vibrate(pattern);
    }
}

function showStatus(msg) {
    const el = document.getElementById('activation-status');
    if (el) el.textContent = msg;
    document.getElementById('system-status').textContent = msg;
}

function updateChip(id, active, error = false) {
    const chip = document.getElementById(id);
    if (!chip) return;
    
    chip.classList.remove('active', 'error');
    if (error) {
        chip.classList.add('error');
        chip.textContent = chip.textContent.split(' ')[0] + ' ✗';
    } else if (active) {
        chip.classList.add('active');
        chip.textContent = chip.textContent.split(' ')[0] + ' ✓';
    }
}

async function activateDaemon() {
    const btn = document.getElementById('activate-btn');
    btn.disabled = true;
    vibrate([50, 100, 50]);
    
    // Blocco se non HTTPS
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        showStatus("ERRORE: Serve HTTPS!");
        alert("⚠️ CRITICO:\n\nPer usare la camera su Android DEVI usare HTTPS.\n\nSoluzioni:\n1. Carica su Netlify (drop.netlify.com)\n2. Carica su GitHub Pages\n3. Usa localhost con Termux\n\nNon funzionerà mai se apri il file direttamente dal telefono (file://)");
        btn.disabled = false;
        return;
    }
    
    showStatus("Connessione Puter.ai...");
    
    try {
        await puter.init();
        updateChip('net-chip', true);
        state.sensors.net = true;
        
        showStatus("Avvio sensori...");
        
        await startCamera();
        startGPS();
        await initSensors();
        initVoice();
        
        document.getElementById('activation-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('activation-overlay').style.display = 'none';
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('video-wrapper').style.display = 'block';
            state.initialized = true;
            showStatus("ONLINE");
            vibrate(100);
            
            const welcome = "DAEMON online. HTTPS attivo. Sensori pronti. Scrivi 'cosa vedi' per analisi visiva.";
            if (state.conversationHistory.length === 0) {
                addMessage('assistant', welcome);
                if (state.voiceEnabled) speak(welcome);
            } else {
                state.conversationHistory.forEach(msg => {
                    if (msg.role !== 'system') addMessage(msg.role, msg.content);
                });
            }
        }, 500);
        
    } catch (error) {
        console.error(error);
        showStatus("ERRORE: " + error.message);
        btn.disabled = false;
        vibrate([100, 50, 100, 50, 200]);
    }
}

async function startCamera() {
    try {
        const constraints = {
            video: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };
        
        state.videoStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('video');
        video.srcObject = state.videoStream;
        video.muted = true;
        video.playsInline = true;
        
        await video.play();
        
        updateChip('cam-chip', true);
        state.sensors.camera = true;
        
        setInterval(captureFrame, 2000);
        
    } catch (e) {
        console.error("Camera error:", e);
        try {
            const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = fallback;
            state.videoStream = fallback;
            updateChip('cam-chip', true);
            state.sensors.camera = true;
        } catch (e2) {
            updateChip('cam-chip', false, true);
            throw new Error("Camera: " + e2.message);
        }
    }
}

function captureFrame() {
    if (!state.videoStream || !state.sensors.camera) return;
    const video = document.getElementById('video');
    if (!video.videoWidth) return;
    
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    state.lastFrame = canvas.toDataURL('image/jpeg', 0.6);
}

function startGPS() {
    if (!navigator.geolocation) {
        updateChip('gps-chip', false, true);
        return;
    }
    
    navigator.geolocation.watchPosition(
        (pos) => {
            state.currentPosition = pos.coords;
            updateChip('gps-chip', true);
            state.sensors.gps = true;
            const source = pos.coords.accuracy < 20 ? 'GPS' : 'NET';
            document.getElementById('coords').textContent = 
                `${pos.coords.latitude.toFixed(5)} |
